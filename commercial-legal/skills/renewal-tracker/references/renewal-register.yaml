# Renewal Register
#
# Populated by saas-msa-review (handoffs) and renewal-tracker Mode 3 ([CLM] scan).
# Each entry tracks when a contract renews and when you have to cancel by.
#
# The renewal-watcher agent reads this weekly and posts what's coming up.
#
# Date anchoring: cancel_by_* and send_by_effective are always computed from
# current_term_end, never from initial_term_end. current_term_end equals
# initial_term_end when the entry is created and rolls forward by the renewal
# period each time an auto-renewal fires (renewal-tracker Modes 2 and 4 detect
# and surface the roll-forward). Entries with no current_term_end are read as
# current_term_end = initial_term_end.

renewals: []

# Example entry (remove once real data exists):
#
# - counterparty: "Acme SaaS Inc."
#   agreement: "Acme Platform Subscription Agreement"
#   signed_date: 2025-06-15
#   initial_term_end: 2026-06-15      # end of the FIRST term — kept for history, never updated
#   current_term_end: 2026-06-15      # end of the CURRENT term — rolls forward after each auto-renewal
#   last_rolled_on: null              # date the last roll-forward was applied (null until the first renewal fires)
#   renewal_mechanism: "auto-renew annual"
#   notice_period_days: 60
#   notice_method: "email"            # email / portal / certified mail / registered post / courier / per contract §X
#   transit_buffer_days: 0            # 0 for electronic, 5 for domestic certified mail, 10 for international registered post
#   cancel_by_calendar: 2026-04-16    # current_term_end minus notice_period_days
#   cancel_by_effective: 2026-04-16   # cancel_by_calendar rolled back to the last business day if needed
#   send_by_effective: 2026-04-16     # cancel_by_effective minus transit_buffer_days — the date you must SEND the notice
#   cancel_by_roll_note: ""           # e.g., "rolled back from Sunday 2026-11-01"
#   cancel_by_provenance: "[model calculation — verify against the notice clause]"
#   price_on_renewal: "then-current list (uncapped)"
#   annual_value: 48000
#   business_owner: "jane@company.com"
#   clm_id: "IC-12345"
#   docusign_envelope: "abc-123"
#   status: "active"                  # active | cancelled | renewed | lapsed
#   notes: "Pricing uncapped — revisit before renewal"
